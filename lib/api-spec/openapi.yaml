openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification for QuickFleet Workforce Solutions
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: riders
    description: Rider recruitment and management
  - name: rider-applications
    description: Rider job applications
  - name: rider-documents
    description: Rider document management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  
  /v1/riders/jobs:
    get:
      operationId: getRiderJobs
      tags: [riders]
      summary: Get rider-specific job listings
      description: Returns available rider job postings with filters
      parameters:
        - name: hiringType
          in: query
          description: Filter by hiring type
          schema:
            type: string
            enum: [PERMANENT, CONTRACT, TEMPORARY, BULK]
        - name: city
          in: query
          description: Filter by city
          schema:
            type: string
        - name: status
          in: query
          description: Filter by job status
          schema:
            type: string
            enum: [OPEN, CLOSED]
      responses:
        "200":
          description: List of rider jobs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiderJobListResponse"
  
  /v1/riders/applications:
    post:
      operationId: submitRiderApplication
      tags: [rider-applications]
      summary: Submit rider job application
      description: Submit a new rider application with all required details
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RiderApplicationRequest"
      responses:
        "201":
          description: Application submitted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiderApplicationResponse"
        "400":
          description: Invalid application data
    
    get:
      operationId: getRiderApplications
      tags: [rider-applications]
      summary: Get all rider applications
      description: Returns paginated list of rider applications
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
        - name: status
          in: query
          description: Filter by application status
          schema:
            type: string
      responses:
        "200":
          description: List of applications
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiderApplicationListResponse"
  
  /v1/riders/applications/{id}:
    get:
      operationId: getRiderApplication
      tags: [rider-applications]
      summary: Get rider application details
      description: Returns complete application details including verification status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Application details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiderApplicationResponse"
        "404":
          description: Application not found
  
  /v1/riders/applications/{id}/status:
    put:
      operationId: updateApplicationStatus
      tags: [rider-applications]
      summary: Update application status
      description: Update the status of a rider application
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationStatusUpdateRequest"
      responses:
        "200":
          description: Status updated successfully
  
  /v1/riders/documents/upload:
    post:
      operationId: uploadRiderDocument
      tags: [rider-documents]
      summary: Upload rider documents
      description: Upload documents for rider application (DL, Aadhaar, PAN, etc.)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/DocumentUploadRequest"
      responses:
        "201":
          description: Document uploaded successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentUploadResponse"
  
  /v1/riders/eligibility-check:
    post:
      operationId: checkRiderEligibility
      tags: [riders]
      summary: Check rider eligibility
      description: Validate rider eligibility based on provided criteria
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EligibilityCheckRequest"
      responses:
        "200":
          description: Eligibility check result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EligibilityCheckResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    
    RiderJobListResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: array
          items:
            $ref: "#/components/schemas/RiderJob"
    
    RiderJob:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        slug:
          type: string
        location:
          type: string
        hiringType:
          type: string
          enum: [PERMANENT, CONTRACT, TEMPORARY, BULK]
        summary:
          type: string
        requirements:
          type: string
        status:
          type: string
    
    RiderApplicationRequest:
      type: object
      required:
        - fullName
        - email
        - phone
        - drivingLicenseNumber
        - licenseExpiryDate
        - aadhaarNumber
        - panNumber
        - vehicleOwnership
        - hiringType
      properties:
        jobId:
          type: integer
        fullName:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        dateOfBirth:
          type: string
          format: date
        address:
          type: string
        city:
          type: string
        state:
          type: string
        pincode:
          type: string
        drivingLicenseNumber:
          type: string
        licenseExpiryDate:
          type: string
          format: date
        licenseType:
          type: string
          enum: [TWO_WHEELER, FOUR_WHEELER]
        aadhaarNumber:
          type: string
        panNumber:
          type: string
        vehicleOwnership:
          type: string
          enum: [OWN, RENTAL, COMPANY_PROVIDED, NONE]
        vehicleType:
          type: string
        vehicleRegistrationNumber:
          type: string
        deliveryExperienceMonths:
          type: integer
        navigationAppProficiency:
          type: string
          enum: [BEGINNER, INTERMEDIATE, ADVANCED]
        shiftPreference:
          type: string
          enum: [DAY, NIGHT, ROTATIONAL, FLEXIBLE]
        hiringType:
          type: string
          enum: [PERMANENT, CONTRACT, TEMPORARY, BULK]
        resumeUrl:
          type: string
    
    RiderApplicationResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
          properties:
            id:
              type: integer
            applicationStatus:
              type: string
            eligibilityStatus:
              type: string
            documentsVerified:
              type: boolean
            backgroundCheckStatus:
              type: string
            createdAt:
              type: string
              format: date-time
    
    RiderApplicationListResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
          properties:
            content:
              type: array
              items:
                type: object
            totalElements:
              type: integer
            totalPages:
              type: integer
    
    ApplicationStatusUpdateRequest:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [SUBMITTED, SCREENING, INTERVIEW_SCHEDULED, SELECTED, REJECTED, ONBOARDING, DEPLOYED]
        notes:
          type: string
    
    DocumentUploadRequest:
      type: object
      required:
        - applicationId
        - documentType
        - file
      properties:
        applicationId:
          type: integer
        documentType:
          type: string
          enum: [DL_FRONT, DL_BACK, AADHAAR_FRONT, AADHAAR_BACK, PAN, PHOTO, VEHICLE_RC, INSURANCE]
        file:
          type: string
          format: binary
    
    DocumentUploadResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
          properties:
            documentId:
              type: integer
            documentUrl:
              type: string
    
    EligibilityCheckRequest:
      type: object
      required:
        - age
        - hasValidDL
        - hasAadhaar
        - hasPAN
        - hasSmartphone
      properties:
        age:
          type: integer
        hasValidDL:
          type: boolean
        dlAge:
          type: integer
        hasAadhaar:
          type: boolean
        hasPAN:
          type: boolean
        hasBankAccount:
          type: boolean
        hasSmartphone:
          type: boolean
        hasVehicle:
          type: boolean
    
    EligibilityCheckResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
          properties:
            eligible:
              type: boolean
            criteria:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                  met:
                    type: boolean
                  message:
                    type: string

